name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - 'doc/**'
      - '*.md'

# 並列実行 + 重複起動防止
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile_test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests with Docker Compose
        run: docker compose -f compose.test.yml up test --exit-code-from test --attach-dependencies

      - name: Show logs on failure
        run: docker compose -f compose.test.yml logs
        if: always()
