name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  keruta-api:
    name: Keruta API - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x keruta-api/gradlew

      - name: Run ktlint check
        working-directory: keruta-api
        run: ./gradlew ktlintCheckAll

      - name: Build with Gradle
        working-directory: keruta-api
        run: ./gradlew build --no-daemon

      - name: Run tests
        working-directory: keruta-api
        run: ./gradlew test --no-daemon --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keruta-api-test-results
          path: keruta-api/build/reports/tests/

  keruta-executor:
    name: Keruta Executor - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x keruta-executor/gradlew

      - name: Run ktlint check
        working-directory: keruta-executor
        run: ./gradlew ktlintCheck

      - name: Build with Gradle
        working-directory: keruta-executor
        run: ./gradlew build --no-daemon

      - name: Run tests
        working-directory: keruta-executor
        run: ./gradlew test --no-daemon --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keruta-executor-test-results
          path: keruta-executor/build/reports/tests/

  keruta-agent:
    name: Keruta Agent - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'keruta-agent/go.mod'
          cache-dependency-path: 'keruta-agent/go.sum'

      - name: Run tests
        working-directory: keruta-agent
        run: go test -v ./...

      - name: Build
        working-directory: keruta-agent
        run: go build -v ./...

  kodel:
    name: Kodel - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint check
        run: ./gradlew :kodel:api:ktlintCheck :kodel:core:ktlintCheck

      - name: Build with Gradle
        run: ./gradlew :kodel:api:build :kodel:core:build --no-daemon

      - name: Run tests
        run: ./gradlew :kodel:api:test :kodel:core:test --no-daemon --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kodel-test-results
          path: |
            kodel/api/build/reports/tests/
            kodel/core/build/reports/tests/

  ktcp:
    name: KTCP - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint check
        run: ./gradlew :ktcp:model:ktlintCheck :ktcp:client:ktlintCheck :ktcp:server:ktlintCheck

      - name: Build with Gradle
        run: ./gradlew :ktcp:model:build :ktcp:client:build :ktcp:server:build --no-daemon

      - name: Run tests
        run: ./gradlew :ktcp:model:test :ktcp:client:test :ktcp:server:test --no-daemon --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktcp-test-results
          path: |
            ktcp/model/build/reports/tests/
            ktcp/client/build/reports/tests/
            ktcp/server/build/reports/tests/

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [keruta-api, keruta-executor, keruta-agent, kodel, ktcp]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.keruta-api.result }}" != "success" ]] || \
             [[ "${{ needs.keruta-executor.result }}" != "success" ]] || \
             [[ "${{ needs.keruta-agent.result }}" != "success" ]] || \
             [[ "${{ needs.kodel.result }}" != "success" ]] || \
             [[ "${{ needs.ktcp.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All checks passed successfully!"
