name: CI

on:
  workflow_call:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    branches:
      - develop
    paths-ignore:
      - 'doc/**'
      - '*.md'

# 並列実行 + 重複起動防止
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: keruta_test
          MYSQL_USER: keruta
          MYSQL_PASSWORD: keruta
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u keruta -pkeruta"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: ./gradlew test allTests
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.caching=true
          CHROME_BIN: /usr/bin/google-chrome
          FIREFOX_BIN: /usr/bin/firefox
          ANDROID_HOME: /usr/local/lib/android/sdk
          TEST_DB_JDBC_URL: jdbc:mysql://localhost:3306/keruta_test
          TEST_DB_USERNAME: keruta
          TEST_DB_PASSWORD: keruta

  # ktcl-front と kicl-web は並列実行
  ktcl-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ktcl-front/package-lock.json
      - run: npm ci
        working-directory: ktcl-front
      - run: npm run test
        working-directory: ktcl-front
        env:
          VITE_WEBSOCKET_URL: ws://localhost:8080/ws/ktcp
          VITE_KEYCLOAK_URL: https://user.kigawa.net/
          VITE_KEYCLOAK_REALM: develop
          VITE_KEYCLOAK_CLIENT_ID: keruta
      - run: npm run build
        working-directory: ktcl-front
        env:
          VITE_WEBSOCKET_URL: ws://localhost:8080/ws/ktcp
          VITE_KEYCLOAK_URL: https://user.kigawa.net/
          VITE_KEYCLOAK_REALM: develop
          VITE_KEYCLOAK_CLIENT_ID: keruta

  kicl-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: kicl-web/package-lock.json
      - name: Setup Gradle for KMP build
        uses: gradle/actions/setup-gradle@v6
      - name: Build KMP modules
        run: |
          ./gradlew :kicl:kicl-domain:jsBrowserProductionLibraryDistribution \
                    :kicl:kicl-usecase:jsBrowserProductionLibraryDistribution
      - run: npm ci
        working-directory: kicl-web
      - run: npm run build
        working-directory: kicl-web
        env:
          NODE_ENV: production