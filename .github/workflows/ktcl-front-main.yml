name: ktcl-front-main
on:
  push:
    paths-ignore:
      - README.md
      - Dockerfile_ktse
      - Dockerfile_ktcl_k8s
      - Dockerfile_ktcl_claudecode
      - ktcl-k8s/**
      - .github/workflows/dev-ktcl-k8s.yml
      - .github/workflows/dev-ktse.yml
      - .github/workflows/renovate.yaml
      - .github/renovate.json
      - .idea/**
      - ktcl-k8s/**
      - ktcl-claudecode/**
      - ktcl-front-mobile/**
      - ktcp/server/**
      - ktse/**
    branches:
      - main

jobs:
  ktcl-front:
    uses: ./.github/workflows/release.yml
    secrets:
      HARBOR_PASS: ${{ secrets.HARBOR_PASS }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
    with:
      name: ktcl-front
      manifestFile: ./keruta/main/ktcl-front.yaml
      harborProject: "private"
      repository: "kigawa-net/kigawa-net-k8s"
      dockerFile: './Dockerfile_ktcl_front'
      yamlPath: '[0].spec.template.spec.containers[0].image'
      buildArgs: >
        {
          "VITE_WEBSOCKET_URL": "wss://ktse.kigawa.net/ws/ktcp",
          "VITE_USER_ISSUER": "https://user.kigawa.net/realms/kigawa-net",
          "VITE_USER_CLIENT_ID": "keruta",
          "VITE_KEYCLOAK_URL": "https://user.kigawa.net/",
          "VITE_KEYCLOAK_REALM": "kigawa-net",
          "VITE_KEYCLOAK_CLIENT_ID": "keruta",
          "VITE_PROVIDER_PRESETS": "[
            {
              \"name\": \"ktcl-k8s\",
              \"issuer\": \"https://ktcl-k8s.kigawa.net\",
              \"description\": \"ktcl-k8s\"
            }
          ]"
        }

