name: ktcl-k8s-check
on:
  pull_request:
    branches:
      - develop
    paths:
      - 'ktcl-k8s/**'
      - 'Dockerfile_ktcl_k8s'
      - 'buildSrc/**'
      - '.github/workflows/ktcl-k8s-check.yml'
      - '.github/workflows/build-check.yml'

jobs:
  ktcl-k8s:
    uses: ./.github/workflows/build-check.yml
    with:
      dockerFile: './Dockerfile_ktcl_k8s'
      gradleTask: ':ktcl-k8s:shadowJar -x test'
