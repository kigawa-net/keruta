      PROVIDER_0_AUDIENCE: keruta
      PROVIDER_0_ISSUER: http://127.0.0.1:5173/
      PROVIDER_0_NAME: web
      ZK_HOST: localhost:2181,localhost:2182,localhost:2183
  pd:
    image: pingcap/pd:latest
    hostname: pd
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ./dev/pd.toml:/pd.toml:ro
      - pd-data:/data
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
    networks:
      - tidbnet

  tikv:
    image: pingcap/tikv:latest
    hostname: tikv
    depends_on:
      - pd
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --advertise-status-addr=tikv:20180
    networks:
      - tidbnet

  tidb:
    image: pingcap/tidb:latest
    depends_on:
      - pd
      - tikv
    command:
      - --store=tikv
      - --path=pd:2379
    ports:
      - "4000:4000"
    networks:
      - tidbnet
  init-tidb:
    image: mysql:9.7
    depends_on:
      - tidb
    networks:
      - tidbnet
    restart: "no"
    entrypoint: >
      sh -c "
      sleep 10 &&
      mysql -h tidb -P 4000 -u root -e \"CREATE DATABASE IF NOT EXISTS keruta;\" &&
      mysql -h tidb -P 4000 -u root -e \"CREATE USER IF NOT EXISTS 'keruta-user'@'%' IDENTIFIED BY 'keruta-pass';\" &&
      mysql -h tidb -P 4000 -u root -e \"GRANT ALL PRIVILEGES ON keruta.* TO 'keruta-user'@'%';\" &&
      mysql -h tidb -P 4000 -u root -e \"FLUSH PRIVILEGES;\"
      "
  zk-dev1:
    image: zookeeper
    restart: no
    hostname: zk-dev1
    networks: [zknet]
    volumes:
      - type: volume
        source: zk1-data
        target: /data
      - type: volume
        source: zk1-datalog
        target: /datalog
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zk-dev1:2888:3888;2181 server.2=zk-dev2:2888:3888;2181 server.3=zk-dev3:2888:3888;2181

  zk-dev2:
    image: zookeeper
    restart: no
    hostname: zk-dev2
    networks: [zknet]
    volumes:
      - type: volume
        source: zk2-data
        target: /data
      - type: volume
        source: zk2-datalog
        target: /datalog
    ports:
      - "2182:2181"
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zk-dev1:2888:3888;2181 server.2=zk-dev2:2888:3888;2181 server.3=zk-dev3:2888:3888;2181

  zk-dev3:
    image: zookeeper
    restart: no
    hostname: zk-dev3
    networks: [zknet]
    volumes:
      - type: volume
        source: zk3-data
        target: /data
      - type: volume
        source: zk3-datalog
        target: /datalog
    ports:
      - "2183:2181"
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zk-dev1:2888:3888;2181 server.2=zk-dev2:2888:3888;2181 server.3=zk-dev3:2888:3888;2181
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file
      - KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_CHECK3PCOOKIES_ENABLED=false
      - KC_HTTP_CORS_ENABLED=true
      - KC_HTTP_CORS_ALLOWED_ORIGINS=http://localhost:5173
      - KC_HTTP_CSP=frame-src 'self' http://localhost:5173; frame-ancestors 'self' http://localhost:5173
    ports:
      - "8082:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./dev/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped

networks:
  zknet:
  tidbnet:

volumes:
  pd-data:
  zk1-data:
  zk1-datalog:
  zk2-data:
  zk2-datalog:
  zk3-data:
  zk3-datalog:
  keycloak-data:
