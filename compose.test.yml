services:
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=keruta_test
      - MYSQL_USER=keruta
      - MYSQL_PASSWORD=keruta
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "keruta", "-pkeruta"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/mysql
  rsync:
    build:
      context: .
      dockerfile: Dockerfile_rsync
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    command:
      - bash
      - -c
      - |
        set -ue
        if [ ! -d /src/cache/app ]; then mkdir -p /src/cache/app; fi
        if [ ! -d /src/cache/.gradle ]; then mkdir -p /src/cache/.gradle; fi
        if [ -d /src/cache/app/kotlin-js-store ]; then rm -r /src/cache/app/kotlin-js-store; fi
        rsync -avz --delete /src/ /src/cache/app \
          --exclude=/.git \
          --exclude=/.idea \
          --exclude=/.claude \
          --exclude=/.github \
          --exclude=/.junie \
          --exclude=/.kotlin \
          --exclude=/.serena \
          --exclude=/.coder-templates \
          --exclude=/.gradle \
          --exclude=/cache \
          --exclude=/keruta-coder-template \
          --exclude=/kigawa-net-k8s \
          --exclude=/kotlin-js-store \
          --exclude=/ktcl-front/node_modules \
          --exclude=/ktcl-front/dist \
          --exclude=/*/build \
          --exclude=/build \
          --exclude=/*/*/build
    volumes:
      - type: bind
        source: .
        target: /src
  ktcl-front-test:
    image: node
    command:
      - bash
      - -c
      - |
        set -ue
        npm install
        npm run test
    working_dir: /app/ktcl-front
    depends_on:
      rsync:
        condition: service_completed_successfully
    environment:
      - VITE_WEBSOCKET_URL=ws://localhost:8080/ws/ktcp
      - VITE_KEYCLOAK_URL=https://user.kigawa.net/
      - VITE_KEYCLOAK_REALM=develop
      - VITE_KEYCLOAK_CLIENT_ID=keruta
    volumes:
      - type: bind
        source: ./cache/app/ktcl-front
        target: /app/ktcl-front
      - type: bind
        source: ./cache/npm
        target: /root/.npm

  ktcl-front-build:
    image: node
    command:
      - bash
      - -c
      - |
        set -ue
        npm install
        npm run build
    working_dir: /app/ktcl-front
    depends_on:
      rsync:
        condition: service_completed_successfully
    environment:
      - VITE_WEBSOCKET_URL=ws://localhost:8080/ws/ktcp
      - VITE_KEYCLOAK_URL=https://user.kigawa.net/
      - VITE_KEYCLOAK_REALM=develop
      - VITE_KEYCLOAK_CLIENT_ID=keruta
    volumes:
      - type: bind
        source: ./cache/app/ktcl-front
        target: /app/ktcl-front
      - type: bind
        source: ./cache/npm
        target: /root/.npm

  gradle-test:
    build:
      context: .
      dockerfile: Dockerfile_test
    command: ./gradlew test allTests
    depends_on:
      rsync:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./cache/app
        target: /app
      - type: bind
        source: ./cache/.gradle
        target: /root/.gradle
    working_dir: /app
    environment:
      - GRADLE_OPTS=-Dorg.gradle.daemon=false
      - CHROME_BIN=/opt/google/chrome/chrome
      - FIREFOX_BIN=/usr/bin/firefox
      - TEST_DB_JDBC_URL=jdbc:mysql://mysql:3306/keruta_test
      - TEST_DB_USERNAME=keruta
      - TEST_DB_PASSWORD=keruta

  test:
    image: busybox
    depends_on:
      gradle-all-tests:
        condition: service_completed_successfully
      ktcl-front-test:
        condition: service_completed_successfully
      gradle-test:
        condition: service_completed_successfully
      ktcl-front-build:
        condition: service_completed_successfully
