ktor:
  application:
    modules:
      - net.kigawa.keruta.ktse.KerutaTaskServer.module
  deployment:
    port: 8080
  security:
    defaultIdp:
      - issuer: ${IDP_0_ISSUER}
        audience: ${IDP_0_AUDIENCE}
    defaultProvider:
      - issuer: ${PROVIDER_0_ISSUER}
        audience: ${PROVIDER_0_AUDIENCE}
        name: ${PROVIDER_0_NAME}
zk:
  host: ${ZK_HOST}
db:
  jdbcUrl: ${DB_JDBC_URL}
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
