apiVersion: batch/v1
kind: Job
metadata:
  name: keruta-task-template
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600  # 1時間後に自動削除
  backoffLimit: 0  # リトライなし
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: git-clone
        image: alpine/git:latest
        command: ["git", "clone", "$(GIT_REPO_URL)", "/workspace"]
        env:
        - name: GIT_REPO_URL
          value: ""
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      containers:
      - name: task-executor
        image: harbor.kigawa.net/library/keruta-executor:latest
        env:
        - name: TASK_ID
          value: ""
        - name: TASK_TITLE
          value: ""
        - name: TASK_DESCRIPTION
          value: ""
        - name: GIT_REPO_URL
          value: ""
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: keruta-task-template-pvc