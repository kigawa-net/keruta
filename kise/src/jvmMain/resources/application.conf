ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    
    security {
        defaultIdp {
            issuer = "https://id.kigawa.net"
            audience = "keruta"
        }
        
        defaultProvider {
            issuer = "https://id.kigawa.net"
            audience = "keruta"
            name = "default"
        }
    }
}

kise {
    issuer = "https://id.kigawa.net"
    audience = "keruta"
    token {
        expiresInMs = 3600000
    }
    session {
        timeoutMs = 3600000
        maxPerUser = 10
    }
    database {
        url = "jdbc:mysql://localhost:3306/keruta"
        user = "keruta"
        password = ""
    }
    default {
        userIdp {
            issuer = "https://id.kigawa.net/"
        }
        provider {
            issuer = "https://id.kigawa.net/"
        }
    }
    jwt {
        publicKey = ""
        privateKey = ""
    }
    oidc {
        clientId = "kise-client"
        redirectUri = "http://localhost:8080/callback"
    }
}
